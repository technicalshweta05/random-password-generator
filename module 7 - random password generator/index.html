<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator UI</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: #1e1e1e;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Card */
.container {
    background: #2c2c2c;
    padding: 25px 30px;
    border-radius: 12px;
    width: 300px;
    color: #fff;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* Title */
.container h2 {
    font-size: 18px;
    margin-bottom: 15px;
}

/* Password Box */
.password-box {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #1a1a1a;
    padding: 8px 10px;
    border-radius: 6px;
    margin-bottom: 15px;
}

.password-box input {
    border: none;
    outline: none;
    background: transparent;
    color: #fff;
    width: 100%;
    font-size: 14px;
}

.copy-icon {
    cursor: pointer;
    font-size: 14px;
    opacity: 0.7;
}

/* Length Section */
.length-box {
    margin-bottom: 10px;
}

.length-box label {
    font-size: 13px;
}

.length-box span {
    float: right;
    font-size: 13px;
}

/* Slider */
input[type="range"] {
    width: 100%;
    margin-top: 5px;
}

/* Options */
.options {
    margin: 12px 0;
}

.options label {
    display: block;
    font-size: 13px;
    margin-bottom: 6px;
}

.options input {
    margin-right: 6px;
}

/* Button */
button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: #2ecc71;
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #27ae60;
}
</style>

</head>
<body>

<div class="container">
    <h2>🔑 Password Generator</h2>

    <div class="password-box">
        <input type="text" value="">
        <span class="copy-icon">📋</span>
    </div>

    <div class="length-box">
        <label>Password Length</label>
        <span>12</span>
        <input type="range" min="4" max="20" value="12">
    </div>

    <div class="options">
        <label><input type="checkbox" checked> Include Uppercase</label>
        <label><input type="checkbox" checked> Include Lowercase</label>
        <label><input type="checkbox" checked> Include Numbers</label>
        <label><input type="checkbox" checked> Include Symbols</label>
    </div>

    <button>⚡ Generate</button>
</div>

</body>
<script src="app.js"></script>
</html>
